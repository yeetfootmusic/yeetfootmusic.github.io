<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yeetfoot | EPK</title>

<link rel="stylesheet" href="style.css"/>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- CINEMATIC INTRO -->
<div class="intro" id="intro">
  <h1>YEETFOOT</h1>
</div>

<!-- BACKGROUND -->
<canvas id="bg"></canvas>

<div class="content">

<!-- HERO -->
<section class="hero reveal">

  <h1>YEETFOOT</h1>

  <div class="socials">

    <a href="https://open.spotify.com/artist/72lU4JJ2Hpqz4xuXzw7Ntg" target="_blank">
      <i class="fa-brands fa-spotify"></i>
    </a>

    <a href="https://www.instagram.com/yeetfootmusic/" target="_blank">
      <i class="fa-brands fa-instagram"></i>
    </a>

    <a href="https://music.apple.com/gb/artist/yeetfoot/1636863748" target="_blank">
      <i class="fa-brands fa-apple"></i>
    </a>

    <a href="https://www.youtube.com/channel/UCcBVL7m0duC37T-6wvVXBWw" target="_blank">
      <i class="fa-brands fa-youtube"></i>
    </a>

    <a href="mailto:booking@yeetfoot.com">
      <i class="fa-solid fa-envelope"></i>
    </a>

  </div>

  <p class="tagline">Melodic • Atmospheric • Club Energy</p>

</section>

<!-- LATEST RELEASE -->
<section class="section reveal">
  <h2>LATEST RELEASE</h2>

  <div class="release-box">
    <h3>Yeetfoot</h3>
    <p>Stream across all platforms</p>
    <a href="https://open.spotify.com/artist/72lU4JJ2Hpqz4xuXzw7Ntg" target="_blank">
      LISTEN NOW
    </a>
  </div>
</section>

<!-- MUSIC -->
<section class="section dark reveal">
  <h2>MUSIC</h2>

  <iframe
    src="https://open.spotify.com/embed/artist/72lU4JJ2Hpqz4xuXzw7Ntg?utm_source=generator"
    width="100%"
    height="380"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</section>

<!-- STREAM PLATFORMS -->
<section class="section reveal">
  <h2>STREAM ON</h2>

  <div class="platforms">

    <a href="https://open.spotify.com/artist/72lU4JJ2Hpqz4xuXzw7Ntg" target="_blank">Spotify</a>

    <a href="https://music.apple.com/gb/artist/yeetfoot/1636863748" target="_blank">Apple Music</a>

    <a href="https://www.youtube.com/channel/UCcBVL7m0duC37T-6wvVXBWw" target="_blank">YouTube</a>

    <a href="https://www.instagram.com/yeetfootmusic/" target="_blank">Instagram</a>

  </div>
</section>

<!-- PROMOTER EMAIL CAPTURE -->
<section class="section dark reveal">
  <h2>FOR PROMOTERS</h2>

  <p>Get updates on releases + availability</p>

  <form id="emailForm" class="email-form">
    <input type="email" id="emailInput" placeholder="Email address" required />
    <button type="submit">REQUEST EPK</button>
  </form>

  <p class="small">No spam. Only booking + release updates.</p>
</section>

<footer>
  <p>© YEETFOOT</p>
</footer>

</div>

<script src="script.js"></script>
</body>
</html>
