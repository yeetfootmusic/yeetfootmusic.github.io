<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yeetfoot | Official EPK</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1>YEETFOOT</h1>
      <p>Electronic / House / Melodic</p>

      <div class="links">
        <a href="https://open.spotify.com" target="_blank">Spotify</a>
        <a href="https://instagram.com" target="_blank">Instagram</a>
        <a href="mailto:booking@yeetfoot.com">Booking</a>
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="section">
    <h2>ABOUT</h2>
    <p>
      Yeetfoot is an electronic music project focused on melodic house,
      atmospheric textures, and driving rhythmic energy.
    </p>
  </section>

  <!-- MUSIC -->
  <section class="section dark">
    <h2>LISTEN</h2>

    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/artist/YOUR_SPOTIFY_ID"
      width="100%" height="352" frameborder="0"
      allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </section>

  <!-- PRESS PHOTOS -->
  <section class="section">
    <h2>PRESS</h2>

    <div class="grid">
      <div class="card"></div>
      <div class="card"></div>
      <div class="card"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section dark">
    <h2>BOOKING</h2>
    <p>For shows, collaborations, and licensing:</p>
    <a class="email" href="mailto:booking@yeetfoot.com">booking@yeetfoot.com</a>
  </section>

  <footer>
    <p>© Yeetfoot</p>
  </footer>

</body>
</html>
